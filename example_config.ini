# 示例配置文件
# 用于定义应用中控件的相对位置

[close_button]
# direction: 参考点方向
# 可选值: left_top, right_top, left_bottom, right_bottom, top_center, bottom_center, left_center, right_center, window_size
direction = right_top
# location: 相对位置坐标 (x, y, width, height)
location = 10, 10, 40, 30

[open_button]
direction = left_bottom
location = 20, 20, 50, 35

[menu_item]
direction = left_top
location = 100, 200, 80, 40
